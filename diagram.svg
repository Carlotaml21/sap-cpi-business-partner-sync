<svg viewBox="0 0 920 380" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cpi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4C5FD5"/><stop offset="1" stop-color="#12A594"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5A6577"/>
    </marker>
  </defs>
  <rect width="920" height="380" fill="#F4F6F9"/>

  <!-- S/4HANA -->
  <rect x="30" y="120" width="210" height="130" rx="14" fill="#FFFFFF" stroke="#E0E5EC"/>
  <text x="135" y="158" text-anchor="middle" font-size="16" font-weight="700" fill="#1E2530">SAP S/4HANA</text>
  <text x="135" y="184" text-anchor="middle" font-size="13" fill="#586075">Business Partner</text>
  <text x="135" y="202" text-anchor="middle" font-size="13" fill="#586075">OData API</text>
  <text x="135" y="227" text-anchor="middle" font-size="11.5" fill="#929BAB">Accelerator Hub sandbox</text>

  <!-- CPI -->
  <rect x="340" y="70" width="240" height="240" rx="16" fill="#FFFFFF" stroke="url(#cpi)" stroke-width="2"/>
  <text x="460" y="104" text-anchor="middle" font-size="15" font-weight="700" fill="#1E2530">SAP Integration Suite</text>
  <text x="460" y="123" text-anchor="middle" font-size="12.5" fill="#0C7F73" font-weight="600">Cloud Integration · iFlow</text>
  <g font-size="13" fill="#1E2530">
    <text x="366" y="162">1 · HTTPS sender</text>
    <text x="366" y="192">2 · Message mapping</text>
    <text x="366" y="222">3 · Groovy</text>
    <text x="366" y="252">4 · Request-Reply (POST)</text>
  </g>
  <text x="460" y="291" text-anchor="middle" font-size="11" fill="#929BAB">exception subprocess · retry · MPL logging</text>

  <!-- CRM -->
  <rect x="680" y="120" width="200" height="130" rx="14" fill="#FFFFFF" stroke="#E0E5EC"/>
  <text x="780" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#1E2530">External CRM</text>
  <text x="780" y="196" text-anchor="middle" font-size="13" fill="#586075">REST API (mock)</text>

  <!-- arrows -->
  <line x1="240" y1="185" x2="336" y2="185" stroke="#5A6577" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="288" y="173" text-anchor="middle" font-size="11" fill="#586075">OData GET</text>
  <text x="288" y="201" text-anchor="middle" font-size="10.5" fill="#929BAB">APIKey</text>

  <line x1="580" y1="185" x2="676" y2="185" stroke="#5A6577" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="628" y="173" text-anchor="middle" font-size="11" fill="#586075">POST JSON</text>
  <text x="628" y="201" text-anchor="middle" font-size="10.5" fill="#929BAB">OAuth2</text>
</svg>
